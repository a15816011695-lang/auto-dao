name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # -------------------------------------------------------------------------
  # Quality checks: linting, type checking, and tests
  # -------------------------------------------------------------------------
  quality:
    name: Lint, Type Check & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run ruff check
        run: python -m ruff check .

      - name: Run mypy type check
        run: python -m mypy scripts/ --ignore-missing-imports

      - name: Run tests
        run: python -m pytest tests/ -q

  # -------------------------------------------------------------------------
  # Example directory structure validation
  # -------------------------------------------------------------------------
  check-examples:
    name: Example Directory Structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate example directories
        run: python scripts/ci/check_examples.py

  # -------------------------------------------------------------------------
  # Markdown link check
  # -------------------------------------------------------------------------
  check-links:
    name: Markdown Link Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: "yes"
          config-file: ".github/mlc_config.json"
